name: Job Search Automation

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 8:30 AM IST
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write          # ✅ Allows GITHUB_TOKEN to push changes

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4        # ✅ Upgraded from v3 to v4

      - name: Set up Python
        uses: actions/setup-python@v5   # ✅ Upgraded from v4 to v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests selenium beautifulsoup4

      - name: Install ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Run job search script
        run: python main.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.name "JobBot"
          git config --global user.email "jobbot@example.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add frontend/jobs.json
          git commit -m "Update jobs list" || echo "No changes to commit"
          git push
