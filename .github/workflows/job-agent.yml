name: AI Job Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job engine
        run: python main.py

      # 🔥 THIS IS THE FIX (creates website)
      - name: Prepare dashboard
        run: |
          mkdir -p public
          cp jobs.json public/index.json
          echo "<h1>AI Job Engine</h1><pre id='data'></pre>
          <script>
          fetch('index.json').then(r=>r.json()).then(d=>{
            document.getElementById('data').innerText = JSON.stringify(d, null, 2)
          })
          </script>" > public/index.html

      # 🔥 PUBLISH TO GITHUB PAGES
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
