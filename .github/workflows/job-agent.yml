name: AI Recruiter v5

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Recruiter
        run: python backend/main.py

      - name: Commit jobs.json
        run: |
          git config --global user.name "ai-bot"
          git config --global user.email "bot@github.com"
          git add jobs.json
          git commit -m "AI recruiter update" || echo "no changes"
          git push
