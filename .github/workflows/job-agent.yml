name: Job Search Automation

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 8:30 AM IST
  workflow_dispatch:       # Allow manual trigger

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests selenium beautifulsoup4

      - name: Install ChromeDriver
        run: sudo apt-get install -y chromium-browser chromium-chromedriver

      # 👇 Run the script from root
      - name: Run job search script
        run: python main.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.name "JobBot"
          git config --global user.email "jobbot@example.com"
          git add frontend/jobs.json
          git commit -m "Update jobs list"
          git push
