name: AI Job Recruiter V4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run Job Agent
        run: python main.py

      - name: Copy jobs.json to frontend
        run: cp jobs.json frontend/jobs.json || true

      - name: Show files
        run: ls -R

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-output
          path: jobs.json

      - name: Commit jobs.json to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jobs.json frontend/jobs.json || true
          git commit -m "Updated jobs feed" || echo "No changes"
          git push || echo "No push"
