name: Job Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run Job Engine
        run: python main.py

      - name: Verify output
        run: cat jobs.json || echo "jobs.json missing"

      - name: Commit & Push jobs.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add jobs.json
          git commit -m "update jobs feed" || echo "no changes"
          git push
