name: AI Job Recruiter V4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run job agent
        run: python main.py

      - name: Ensure frontend folder exists
        run: mkdir -p frontend

      - name: Copy output to frontend
        run: cp jobs.json frontend/jobs.json || true

      - name: Debug files
        run: |
          ls -R

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add jobs.json frontend/jobs.json
          git commit -m "update jobs feed" || echo "no changes"
          git push || echo "no push"
