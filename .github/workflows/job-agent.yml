name: Job Agent

on:
  workflow_dispatch:   # 🔥 MANUAL RUN BUTTON ENABLED
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Job Agent
        run: python main.py

      - name: Show files (DEBUG)
        run: ls -la

      - name: Commit jobs.json to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add jobs.json
          git commit -m "update jobs.json" || echo "no changes"
          git push
