name: Job Agent (DEBUG MODE)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 🔥 RUN SCRIPT (WITH STRICT ERROR DISPLAY)
      - name: Run script (DEBUG)
        run: |
          set -e
          python main.py

      # 🔥 SHOW EXACT FILE SYSTEM STATE
      - name: DEBUG - List all files
        run: |
          echo "===== CURRENT DIRECTORY ====="
          pwd
          echo "===== FILE LIST ====="
          ls -la
          echo "===== CHECK JOBS.JSON ====="
          if [ -f jobs.json ]; then
            echo "jobs.json EXISTS ✅"
            cat jobs.json
          else
            echo "jobs.json NOT FOUND ❌"
          fi

      # 🔥 FAIL SAFE COMMIT STEP
      - name: Commit jobs.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          if [ -f jobs.json ]; then
            git add jobs.json
            git commit -m "update jobs.json (debug fix)" || echo "no changes to commit"
            git push || echo "push failed"
          else
            echo "❌ Cannot commit - jobs.json missing"
            exit 1
          fi
