name: Job Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run script
        run: python main.py

      - name: Debug - show files
        run: |
          ls -la
          cat jobs.json || echo "jobs.json NOT FOUND"

      - name: Commit file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add jobs.json
          git commit -m "update jobs" || echo "no changes"
          git push || echo "push done"
