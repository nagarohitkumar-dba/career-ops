<!DOCTYPE html>
<html>
<head>
  <title>AI SQL DBA Recruiter</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      margin: 0;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: #111;
      color: #00ff88;
      font-size: 20px;
    }

    .filters {
      text-align: center;
      padding: 10px;
    }

    select {
      padding: 8px;
      border-radius: 6px;
    }

    .card {
      background: #1e1e1e;
      margin: 10px auto;
      padding: 15px;
      max-width: 600px;
      border-radius: 12px;
    }

    .score {
      color: #00ff88;
    }

    .apply {
      display: inline-block;
      margin-top: 10px;
      background: #00ff88;
      color: black;
      padding: 6px 10px;
      border-radius: 6px;
      text-decoration: none;
    }

    .best {
      border: 2px solid gold;
    }
  </style>
</head>

<body>

<div class="header">
  🚀 AI JOB RECRUITER v4
</div>

<div class="filters">
  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="azure">Azure DBA</option>
    <option value="senior">Senior</option>
    <option value="remote">Remote</option>
    <option value="sql">SQL DBA</option>
  </select>
</div>

<div id="jobs"></div>

<script>
let jobsData = [];

fetch("../jobs.json")
.then(r => r.json())
.then(data => {
  jobsData = data.jobs;
  render();
});

function render() {
  let f = document.getElementById("filter").value;
  let box = document.getElementById("jobs");
  box.innerHTML = "";

  let filtered = jobsData.filter(j => {
    let t = j.title.toLowerCase();

    if (f === "azure") return t.includes("azure");
    if (f === "senior") return t.includes("senior");
    if (f === "sql") return t.includes("sql");
    if (f === "remote") return j.remote;
    return true;
  });

  filtered.forEach((j, i) => {
    box.innerHTML += `
      <div class="card ${i === 0 ? 'best' : ''}">
        <h3>${j.title}</h3>
        <p>${j.company}</p>
        <p class="score">Score: ${j.score}</p>
        <a class="apply" href="${j.link}" target="_blank">Apply</a>
      </div>
    `;
  });
}
</script>

</body>
</html>
